name: TEST — 제보 URL 1건 처리

on:
  workflow_dispatch:
    inputs:
      url:
        description: '테스트할 인스타 게시물 URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r submissions/requirements.txt
      - env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python submissions/processor.py "${{ inputs.url }}" --submitted-by "test"
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add submissions/data/
          git diff --staged --quiet || (git commit -m "test 제보 1건" && git push)

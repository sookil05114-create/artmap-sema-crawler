name: SeMA + MMCA 전시·교육 자동 수집 (매일)

on:
  schedule:
    # 매일 한국시간 새벽 5시 (UTC 20시)
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl_all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r sema_crawler/requirements.txt
          pip install -r mmca_crawler/requirements.txt

      # 외부 사이트 다운/타임아웃 시에도 워크플로우 전체는 계속 진행
      # (실패한 crawler는 이전 캐시 데이터를 그대로 사용)
      - name: Run SeMA crawler
        run: python sema_crawler/crawler.py
        continue-on-error: true

      - name: Run MMCA crawler (exhibitions + education)
        run: python mmca_crawler/crawler.py
        continue-on-error: true

      - name: Merge all sources
        run: python merger/merge.py

      - name: Commit data (with retry on conflict)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sema_crawler/data/ mmca_crawler/data/ merger/data/
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
            exit 0
          fi
          git commit -m "전시·교육 데이터 자동 업데이트 ($(date -u +%Y-%m-%d))"
          # 다른 작업과의 push 경합 처리 — 충돌 시 rebase 후 재시도 (최대 5회)
          for i in 1 2 3 4 5; do
            if git push; then
              echo "push 성공 (시도 $i)"
              exit 0
            fi
            echo "push 거부 — pull --rebase 후 재시도 ($i/5)"
            sleep 5
            git pull --rebase --autostash || true
          done
          echo "5회 시도 모두 실패"
          exit 1

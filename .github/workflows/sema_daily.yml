name: SeMA + MMCA 전시·교육 자동 수집 (매일)

on:
  schedule:
    # 매일 한국시간 새벽 5시 (UTC 20시)
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl_all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r sema_crawler/requirements.txt
          pip install -r mmca_crawler/requirements.txt

      - name: Run SeMA crawler
        run: python sema_crawler/crawler.py

      - name: Run MMCA crawler (exhibitions + education)
        run: python mmca_crawler/crawler.py

      - name: Merge all sources
        run: python merger/merge.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sema_crawler/data/ mmca_crawler/data/ merger/data/
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "전시·교육 데이터 자동 업데이트 ($(date -u +%Y-%m-%d))"
            git push
          fi
